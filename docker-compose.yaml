services:

  kafka:
    image:  apache/kafka:4.2.0
    ports:
      - "9092:9092"
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    env_file:
      - .env

  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres