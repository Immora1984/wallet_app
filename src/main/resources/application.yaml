logging:
  level:
    sql: debug

kafka:
  bootstrap-servers: localhost:9092 # Адрес вашего Kafka брокера
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    group-id: my-app-group # Группа потребителя
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring:
        json:
          trusted:
            packages: '*' # Разрешаем десериализацию из любого пакета
app:
  kafka:
    topic: user-events
spring:
  jpa:
    properties:
      hibernate.jdbc.batch_size: 30
      hibernate.order_updates: true
      hibernate.order_inserts: true
    open-in-view: false
    hibernate:
      ddl-auto: validate

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  security:
    jwt:
      expires: 24h
      private: rsa/private.pem
      public: rsa/public.pem

  main:
    banner-mode: off
  mvc:
    view:
      suffix: .html
      prefix: /static/
    problemdetails.enabled: true
  web:
    locale: ru

server:
  port: 8080